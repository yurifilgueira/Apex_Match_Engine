version: '3.8'

services:
  apex-engine:
    build: .
    container_name: apex-matching-engine
    ports:
      - 9090:8080
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apex-network

  apex-gateway:
    build: .
    container_name: apex-order-gateway
    entrypoint: ["java", "-jar", "gateway.jar"]
    ports:
      - "8080:8080"
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    depends_on:
      - apex-engine
    networks:
      - apex-network

  aeron-simulator:
    build: .
    container_name: aeron-load-simulator
    entrypoint: [
      "java",
      "-cp", "engine.jar",
      "-Dloader.path=engine-tests.jar",
      "-Dloader.main=com.apex.engine.simulator.AeronOrderPublisherSimulator",
      "org.springframework.boot.loader.launch.PropertiesLauncher"
    ]
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED -Dtest.orders=5000000
      - AERON_CHANNEL=aeron:udp?endpoint=apex-engine:40456
      - AERON_DIR=/dev/shm/aeron
    volumes:
      - /dev/shm:/dev/shm
    depends_on:
      apex-engine:
        condition: service_healthy
    networks:
      - apex-network

  k6:
    image: grafana/k6:latest
    container_name: k6-load-tester
    command:
      - run
      - /scripts/first-test.js
    volumes:
      - ./apex-engine/src/test/k6-load-tests:/scripts
    environment:
      - HTTP_HOST=apex-gateway
      - HTTP_PORT=8080
    depends_on:
      - apex-gateway
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge
