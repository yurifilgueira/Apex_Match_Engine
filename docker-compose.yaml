version: '3.8'

services:
  apex-engine:
    build: .
    container_name: apex-matching-engine
    ports:
      - "8080:8080"
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/orders > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apex-network

  aeron-simulator:
    build: .
    container_name: aeron-load-simulator
    entrypoint: [
      "java",
      "-cp", "app.jar",
      "-Dloader.path=tests.jar",
      "-Dloader.main=com.apex.engine.simulator.AeronOrderPublisherSimulator",
      "org.springframework.boot.loader.launch.PropertiesLauncher"
    ]
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
      - AERON_CHANNEL=aeron:udp?endpoint=apex-engine:40456
      - AERON_DIR=/dev/shm/aeron
    volumes:
      - /dev/shm:/dev/shm
    depends_on:
      apex-engine:
        condition: service_healthy
    networks:
      - apex-network

  k6:
    image: grafana/k6:latest
    container_name: k6-load-tester
    command:
      - run
      - /scripts/first-test.js
    volumes:
      - ./src/test/k6-load-tests:/scripts
    environment:
      - HTTP_HOST=apex-engine
    depends_on:
      apex-engine:
        condition: service_healthy
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge
