version: '3.8'

services:
  apex-engine:
    build:
      context: .
      target: java-final
    container_name: apex-matching-engine
    ports:
      - 9090:8080
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/orders > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apex-network

  apex-gateway:
    build:
      context: .
      target: java-final
    container_name: apex-order-gateway
    entrypoint: ["java", "-jar", "gateway.jar"]
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    depends_on:
      - apex-engine
    networks:
      - apex-network

  aeron-simulator:
    build:
      context: .
      target: java-final
    container_name: aeron-load-simulator
    entrypoint: [
      "java",
      "-cp", "engine.jar",
      "-Dloader.path=engine-tests.jar",
      "-Dloader.main=com.apex.engine.simulator.AeronOrderPublisherSimulator",
      "org.springframework.boot.loader.launch.PropertiesLauncher"
    ]
    environment:
      - JDK_JAVA_OPTIONS=--add-opens java.base/jdk.internal.misc=ALL-UNNAMED -Dtest.orders=5000000
      - AERON_CHANNEL=aeron:ipc
      - AERON_DIR=/dev/shm/aeron
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - apex-network

  k6:
    build:
      context: .
      target: k6-final
    container_name: k6-load-tester
    command:
      - run
      - /scripts/k6-binary-test.js
    volumes:
      - ./apex-gateway/src/test/load-tests:/scripts
    environment:
      - GATEWAY_HOST=apex-order-gateway
      - GATEWAY_PORT=8081
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge
