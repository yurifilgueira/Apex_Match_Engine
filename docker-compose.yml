version: '3.8'

services:
  apex-engine:
    build: .
    container_name: apex-matching-engine
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - apex-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  k6:
    image: grafana/k6:latest
    container_name: k6-load-tester
    command:
      - run
      - /scripts/grpc-test.js
    volumes:
      - ./src/test/k6-load-tests:/scripts
      - ./src/main/resources/proto:/proto
    environment:
      - GRPC_HOST=apex-engine
    depends_on:
      - apex-engine
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge