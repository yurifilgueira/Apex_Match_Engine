syntax = "proto3";

package com.apex.engine.v1;

option java_package = "com.apex.engine.v1.grpc";
option java_multiple_files = true;
option java_outer_classname = "ApexEngineProto";

enum Side {
  UNKNOWN = 0;
  ASK = 1;
  BID = 2;
}

message OrderDTO {
  string ticker = 1;
  int64 price_scaled = 2;
  Side side = 3;
  int32 quantity = 4;
}

message OrderResponse {
  string message = 1;
  bool success = 2;
}

service OrderServiceGrpc {
  rpc CreateOrder (OrderDTO) returns (OrderResponse);
}